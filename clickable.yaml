clickable_minimum_required: 8.0.0
builder: custom
kill: java
dependencies_target:
  - openjdk-21-jdk-headless
build:
  - rm -rf runtime
  - jlink --add-modules java.base,java.compiler,java.datatransfer,java.desktop,java.instrument,java.logging,java.management,java.management.rmi,java.naming,java.net.http,java.prefs,java.rmi,java.scripting,java.se,java.security.jgss,java.security.sasl,java.smartcardio,java.sql,java.sql.rowset,java.transaction.xa,java.xml,java.xml.crypto --strip-debug --output runtime
install_root_data:
  - manifest.json
  - jarman.apparmor
  - jarman.desktop
  - utils/
  - init.sh
  - assets
  - midlet.jar
  - build/$ARCH_TRIPLET/freej2me/build/freej2me.jar
  - ${BUILD_DIR}/runtime/
libraries:
  freej2me:
    builder: custom
    dependencies_host:
      - ant
    prebuild:
      - git submodule update --init --recursive
      - cp -a ../../../libs/freej2me/* .
    build:
      - ant
      - echo ${ARCH}
