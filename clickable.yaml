clickable_minimum_required: 8.0.0
builder: custom
kill: java
dependencies_target:
  - openjdk-21-jdk-headless
build:
  - if ! [ -d runtime ]; then jlink --add-modules java.desktop --strip-debug --output runtime; fi
install_root_data:
  - manifest.json
  - jarman.apparmor
  - jarman.desktop
  - utils/
  - init.sh
  - assets
  - midlet.jar
  - build/$ARCH_TRIPLET/freej2me/build/freej2me.jar
  - ${BUILD_DIR}/runtime/
libraries:
  freej2me:
    builder: custom
    dependencies_host:
      - ant
    prebuild:
      - git submodule update --init --recursive
      - cp -a ../../../libs/freej2me/* .
    build:
      - ant
