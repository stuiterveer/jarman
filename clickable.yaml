clickable_minimum_required: 8.0.0
builder: custom
kill: java
dependencies_host:
  - qemu-user-static
dependencies_target:
  - openjdk-21-jdk-headless
build:
  - if ! [ -d runtime ]; then if [[ "${ARCH}" == "amd64" ]]; then QEMU_ARCH="x86_64"; elif [[ "${ARCH}" == "arm64" ]]; then QEMU_ARCH="aarch64"; elif [[ "${ARCH}" == "armhf" ]]; then QEMU_ARCH="arm"; fi; qemu-${QEMU_ARCH}-static /usr/bin/jlink --add-modules java.desktop --output runtime; fi
install_root_data:
  - manifest.json
  - jarman.apparmor
  - jarman.desktop
  - utils/
  - init.sh
  - assets
  - midlet.jar
  - qml/
  - build/$ARCH_TRIPLET/freej2me/build/freej2me.jar
  - ${BUILD_DIR}/runtime/
libraries:
  freej2me:
    builder: custom
    dependencies_host:
      - ant
    prebuild:
      - git submodule update --init --recursive
      - cp -a ../../../libs/freej2me/* .
    build:
      - ant
